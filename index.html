<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>EJECT — Смотри. Вдохновляйся. Действуй</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#0f1219; color:#e0e0e0; display:flex; height:100vh; overflow:hidden; }
    :root {
      --teal-primary:#00bcd4; --teal-dark:#0097a7; --teal-glow:rgba(0,188,212,0.3);
      --sidebar-bg:#151a22; --main-bg:#0f1219; --card-bg:#1a1f2b; --hover-bg:#1e2532;
      --text-primary:#f0f2f5; --text-secondary:#9aa0b0; --border-color:#2a2f3a;
    }
    
    /* Сайдбар */
    .sidebar { width:260px; background:var(--sidebar-bg); display:flex; flex-direction:column; border-right:1px solid var(--border-color); padding:20px 12px; flex-shrink:0; overflow-y:auto; }
    .logo-area { display:flex; align-items:center; gap:10px; padding:0 8px 25px 8px; border-bottom:1px solid var(--border-color); margin-bottom:20px; }
    .logo-icon { background:linear-gradient(135deg,var(--teal-primary),#00838f); width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; color:white; box-shadow:0 4px 12px var(--teal-glow); }
    .logo-text { font-size:26px; font-weight:700; letter-spacing:-0.5px; color:white; }
    .logo-text span { color:var(--teal-primary); }
    .nav-section { display:flex; flex-direction:column; gap:6px; }
    .nav-item { display:flex; align-items:center; gap:16px; padding:12px 14px; border-radius:12px; font-size:15px; font-weight:500; color:var(--text-secondary); transition:all 0.2s; cursor:pointer; white-space:nowrap; border:none; background:transparent; width:100%; text-align:left; }
    .nav-item i { width:22px; font-size:18px; text-align:center; }
    .nav-item:hover { background-color:var(--hover-bg); color:var(--text-primary); }
    .nav-item.active { background-color:rgba(0,188,212,0.15); color:var(--teal-primary); font-weight:600; }
    
    /* Основной контент */
    .main-content { flex:1; display:flex; flex-direction:column; overflow-y:auto; background:var(--main-bg); }
    .top-bar { display:flex; align-items:center; justify-content:space-between; padding:12px 28px; background:var(--main-bg); border-bottom:1px solid var(--border-color); position:sticky; top:0; z-index:10; }
    .search-wrapper { display:flex; flex:1; max-width:600px; margin:0 20px; }
    .search-input { flex:1; background:#1a1f2b; border:1px solid var(--border-color); border-radius:24px 0 0 24px; padding:10px 20px; font-size:15px; color:white; outline:none; }
    .search-input:focus { border-color:var(--teal-primary); }
    .search-btn { background:#232836; border:1px solid var(--border-color); border-left:none; border-radius:0 24px 24px 0; padding:10px 20px; color:var(--text-secondary); cursor:pointer; }
    .user-actions { display:flex; align-items:center; gap:18px; color:var(--text-secondary); }
    .user-btn { background:none; border:1px solid var(--border-color); color:var(--text-primary); padding:6px 16px; border-radius:20px; font-size:14px; cursor:pointer; display:flex; align-items:center; gap:6px; }
    .user-avatar-small { width:32px; height:32px; border-radius:50%; background:var(--teal-primary); display:flex; align-items:center; justify-content:center; font-weight:600; cursor:pointer; color:#0f1219; }
    
    /* Страницы */
    .page-container { padding:20px 28px; flex:1; overflow-y:auto; }
    .video-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:28px; }
    .video-card { cursor:pointer; transition:transform 0.2s; }
    .video-card:hover { transform:translateY(-4px); }
    .thumbnail { width:100%; aspect-ratio:16/9; background:#1e2532; border-radius:14px; margin-bottom:12px; position:relative; overflow:hidden; background-size:cover; background-position:center; box-shadow:0 8px 20px rgba(0,0,0,0.4); }
    .play-icon-overlay { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.5); width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; color:white; }
    .video-info { display:flex; gap:12px; }
    .channel-img { width:40px; height:40px; border-radius:50%; background:#374151; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-weight:bold; color:white; }
    .video-title { font-weight:600; font-size:15px; margin-bottom:6px; color:var(--text-primary); line-height:1.4; }
    .video-meta { font-size:13px; color:var(--text-secondary); }
    
    /* Формы */
    .form-container { max-width:500px; margin:0 auto; background:var(--card-bg); padding:30px; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.5); }
    .form-group { margin-bottom:20px; }
    .form-group label { display:block; margin-bottom:6px; font-weight:500; color:var(--text-secondary); }
    .form-group input, .form-group textarea, .form-group select { width:100%; padding:10px 14px; background:#0f1219; border:1px solid var(--border-color); border-radius:10px; color:white; font-size:15px; outline:none; }
    .form-group input:focus, .form-group textarea:focus { border-color:var(--teal-primary); box-shadow:0 0 0 2px var(--teal-glow); }
    .btn { background:var(--teal-primary); color:#0f1219; border:none; padding:10px 24px; border-radius:24px; font-weight:600; cursor:pointer; transition:background 0.2s; font-size:15px; }
    .btn:hover { background:#00acc1; }
    .btn-outline { background:transparent; border:1px solid var(--teal-primary); color:var(--teal-primary); padding:8px 20px; border-radius:20px; font-weight:500; cursor:pointer; transition:all 0.2s; }
    .btn-outline:hover { background:rgba(0,188,212,0.1); }
    .btn-danger { background:transparent; border:1px solid #ef4444; color:#ef4444; padding:8px 20px; border-radius:20px; cursor:pointer; }
    .error-message { color:#ef4444; font-size:14px; margin-top:4px; }
    .success-message { color:#10b981; font-size:14px; margin-top:4px; }
    
    /* Видео-страница */
    .video-player { width:100%; max-height:500px; border-radius:16px; margin-bottom:20px; background:#000; }
    .video-details { background:var(--card-bg); padding:20px; border-radius:14px; margin-bottom:20px; }
    .actions-row { display:flex; align-items:center; gap:16px; margin-top:12px; }
    .vote-btn { background:none; border:1px solid var(--border-color); color:var(--text-secondary); padding:8px 16px; border-radius:20px; cursor:pointer; display:flex; align-items:center; gap:6px; font-size:14px; transition:all 0.2s; }
    .vote-btn.active { background:var(--teal-primary); border-color:var(--teal-primary); color:#0f1219; font-weight:600; }
    .vote-btn:hover:not(.active) { background:var(--hover-bg); border-color:var(--teal-primary); }
    
    /* Комментарии */
    .comment-section { margin-top:24px; }
    .comment { display:flex; gap:12px; margin-bottom:16px; align-items:flex-start; }
    .comment-avatar { width:36px; height:36px; border-radius:50%; background:#374151; display:flex; align-items:center; justify-content:center; font-weight:bold; flex-shrink:0; }
    .comment-body { flex:1; }
    .comment-author { font-weight:600; margin-right:8px; }
    .comment-date { font-size:12px; color:var(--text-secondary); }
    .comment-text { margin-top:4px; color:#cbd5e1; }
    .delete-comment-btn { cursor:pointer; color:#ef4444; font-size:14px; margin-left:8px; opacity:0.7; }
    .delete-comment-btn:hover { opacity:1; }
    
    /* Кнопки */
    .subscribe-btn { background:var(--teal-primary); color:#0f1219; border:none; padding:6px 16px; border-radius:20px; font-weight:600; cursor:pointer; }
    .subscribe-btn.subscribed { background:transparent; border:1px solid var(--teal-primary); color:var(--teal-primary); }
    .author-link { cursor:pointer; font-weight:600; color:var(--teal-primary); }
    
    /* Модальное окно */
    .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:50; }
    .modal { background:var(--card-bg); padding:24px; border-radius:16px; max-width:500px; width:90%; }
    
    /* Загрузчик */
    .loader { width:40px; height:40px; border:3px solid rgba(255,255,255,0.1); border-top-color:var(--teal-primary); border-radius:50%; animation:spin 0.8s linear infinite; margin:40px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    
    @media (max-width:768px) {
      .sidebar { width:72px; padding:20px 8px; }
      .logo-text, .nav-item span { display:none; }
      .nav-item { justify-content:center; }
    }
  </style>
</head>
<body>

  <!-- ===== САЙДБАР ===== -->
  <aside class="sidebar">
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-eject"></i></div>
      <div class="logo-text">EJECT<span>.</span></div>
    </div>
    <nav class="nav-section">
      <button class="nav-item active" data-page="home"><i class="fas fa-home"></i> <span>Главная</span></button>
      <button class="nav-item" data-page="subscriptions"><i class="fas fa-bell"></i> <span>Подписки</span></button>
      <button class="nav-item" data-page="playlists"><i class="fas fa-list"></i> <span>Плейлисты</span></button>
      <button class="nav-item" data-page="upload"><i class="fas fa-cloud-upload-alt"></i> <span>Загрузить</span></button>
      <button class="nav-item" data-page="profile"><i class="fas fa-user"></i> <span>Профиль</span></button>
    </nav>
  </aside>

  <!-- ===== ОСНОВНАЯ ЧАСТЬ ===== -->
  <main class="main-content">
    <header class="top-bar">
      <div class="search-wrapper">
        <input type="text" class="search-input" id="searchInput" placeholder="Поиск видео...">
        <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i></button>
      </div>
      <div class="user-actions" id="userActions"></div>
    </header>
    <div class="page-container" id="pageContainer">
      <div class="loader"></div>
    </div>
  </main>

  <script>
    // ========== FIREBASE ИНИЦИАЛИЗАЦИЯ ==========
    const firebaseConfig = {
      apiKey: "AIzaSyCxv_5QZWu5_Us7F2I4BM19_MBTBiC9j00",
      authDomain: "eject-e61f4.firebaseapp.com",
      projectId: "eject-e61f4",
      storageBucket: "eject-e61f4.firebasestorage.app",
      messagingSenderId: "405186518529",
      appId: "1:405186518529:web:f4dbb68b91c635a187aa00"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    // ========== СОСТОЯНИЕ ПРИЛОЖЕНИЯ ==========
    let currentUser = null;
    let currentPage = 'home';
    let selectedVideoId = null;
    let selectedPlaylistId = null;
    let selectedProfileUsername = null;

    const pageContainer = document.getElementById('pageContainer');
    const userActionsDiv = document.getElementById('userActions');
    const navItems = document.querySelectorAll('.nav-item');

    // Следим за авторизацией
    auth.onAuthStateChanged(async (firebaseUser) => {
      if (firebaseUser) {
        const userDoc = await db.collection('users').doc(firebaseUser.uid).get();
        if (userDoc.exists) {
          currentUser = { uid: firebaseUser.uid, email: firebaseUser.email, username: userDoc.data().username };
        }
      } else {
        currentUser = null;
      }
      renderApp();
    });

    function renderApp() {
      updateNavActive();
      renderUserActions();
      switch (currentPage) {
        case 'home': renderHomePage(); break;
        case 'subscriptions': renderSubscriptionsPage(); break;
        case 'playlists': renderPlaylistsPage(); break;
        case 'playlist': renderPlaylistPage(selectedPlaylistId); break;
        case 'upload': renderUploadPage(); break;
        case 'profile': renderProfilePage(selectedProfileUsername); break;
        case 'video': renderVideoPage(selectedVideoId); break;
        case 'search': renderSearchPage(selectedProfileUsername); break;
        case 'login': renderAuthPage(); break;
        default: renderHomePage();
      }
    }

    function navigateTo(page, param = null) {
      currentPage = page;
      if (page === 'video') selectedVideoId = param;
      else if (page === 'playlist') selectedPlaylistId = param;
      else if (page === 'profile') selectedProfileUsername = param;
      else if (page === 'search') selectedProfileUsername = param;
      renderApp();
    }

    function updateNavActive() {
      navItems.forEach(item => {
        const page = item.dataset.page;
        const active = page === currentPage || 
          (currentPage === 'video' && page === 'home') ||
          (currentPage === 'playlist' && page === 'playlists') ||
          (currentPage === 'search' && page === 'home');
        item.classList.toggle('active', active);
      });
    }

    function renderUserActions() {
      if (currentUser) {
        userActionsDiv.innerHTML = `
          <span style="color:var(--text-secondary);">${escapeHtml(currentUser.username)}</span>
          <div class="user-avatar-small">${currentUser.username.charAt(0).toUpperCase()}</div>
          <button class="user-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
        `;
        document.getElementById('logoutBtn')?.addEventListener('click', () => auth.signOut());
      } else {
        userActionsDiv.innerHTML = `<button class="user-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Войти</button>`;
        document.getElementById('loginBtn')?.addEventListener('click', () => navigateTo('login'));
      }
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[m]));
    }

    function containsBadWords(text) {
      const badWords = [
        'негр','негра','негру','негры','негров','неграм','неграми','негре',
        'хуй','хуя','хуё','хуи','хуе','хуйня','пизд','еба','бля','сука',
        'гандон','мудак','пидор','чмо','уеб','заеб','нахуй','похуй','долбо','мразь'
      ];
      const lower = text.toLowerCase();
      return badWords.some(word => lower.includes(word));
    }

    // ========== СТРАНИЦЫ ==========
    
    // Главная
    async function renderHomePage() {
      pageContainer.innerHTML = '<div class="loader"></div>';
      try {
        const snapshot = await db.collection('videos').orderBy('createdAt', 'desc').get();
        const videos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        
        let html = '<h2 style="margin-bottom:20px;">🔥 Рекомендации</h2>';
        if (videos.length === 0) {
          html += '<p style="color:var(--text-secondary);">Пока нет видео. Загрузите первое!</p>';
        } else {
          html += '<div class="video-grid">';
          videos.forEach(v => {
            const thumb = v.thumbnail || '';
            html += `
              <div class="video-card" data-video-id="${v.id}">
                <div class="thumbnail" style="background-image:url('${thumb}'); background-size:cover;">
                  <div class="play-icon-overlay"><i class="fas fa-play"></i></div>
                </div>
                <div class="video-info">
                  <div class="channel-img" style="background:var(--teal-primary);">${v.author.charAt(0).toUpperCase()}</div>
                  <div>
                    <div class="video-title">${escapeHtml(v.title)}</div>
                    <div class="video-meta">${escapeHtml(v.author)} • ${v.views || 0} просмотров</div>
                  </div>
                </div>
              </div>`;
          });
          html += '</div>';
        }
        pageContainer.innerHTML = html;
        
        document.querySelectorAll('.video-card').forEach(card => {
          card.addEventListener('click', () => navigateTo('video', card.dataset.videoId));
        });
      } catch (error) {
        pageContainer.innerHTML = `<p style="color:#ef4444;">Ошибка загрузки: ${error.message}</p>`;
      }
    }

    // Подписки
    async function renderSubscriptionsPage() {
      if (!currentUser) {
        pageContainer.innerHTML = '<p style="color:var(--text-secondary);">Войдите для просмотра подписок.</p>';
        return;
      }
      pageContainer.innerHTML = '<div class="loader"></div>';
      try {
        const subDoc = await db.collection('subscriptions').doc(currentUser.uid).get();
        const subs = subDoc.exists ? (subDoc.data().authors || []) : [];
        
        if (subs.length === 0) {
          pageContainer.innerHTML = '<h2>Подписки</h2><p style="color:var(--text-secondary);">Вы ни на кого не подписаны.</p>';
          return;
        }
        
        const snapshot = await db.collection('videos').where('author', 'in', subs).orderBy('createdAt', 'desc').get();
        const videos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        
        let html = '<h2>Подписки</h2>';
        if (videos.length === 0) {
          html += '<p style="color:var(--text-secondary);">У ваших подписок пока нет видео.</p>';
        } else {
          html += '<div class="video-grid">';
          videos.forEach(v => {
            const thumb = v.thumbnail || '';
            html += `
              <div class="video-card" data-video-id="${v.id}">
                <div class="thumbnail" style="background-image:url('${thumb}'); background-size:cover;">
                  <div class="play-icon-overlay"><i class="fas fa-play"></i></div>
                </div>
                <div class="video-info">
                  <div class="channel-img" style="background:var(--teal-primary);">${v.author.charAt(0).toUpperCase()}</div>
                  <div>
                    <div class="video-title">${escapeHtml(v.title)}</div>
                    <div class="video-meta">${escapeHtml(v.author)} • ${v.views || 0} просмотров</div>
                  </div>
                </div>
              </div>`;
          });
          html += '</div>';
        }
        pageContainer.innerHTML = html;
        document.querySelectorAll('.video-card').forEach(card => {
          card.addEventListener('click', () => navigateTo('video', card.dataset.videoId));
        });
      } catch (error) {
        pageContainer.innerHTML = `<p style="color:#ef4444;">Ошибка: ${error.message}</p>`;
      }
    }

    // Плейлисты
    async function renderPlaylistsPage() {
      if (!currentUser) {
        pageContainer.innerHTML = '<p style="color:var(--text-secondary);">Войдите для управления плейлистами.</p>';
        return;
      }
      pageContainer.innerHTML = '<div class="loader"></div>';
      try {
        const snapshot = await db.collection('playlists').where('ownerId', '==', currentUser.uid).get();
        const playlists = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        
        let html = '<h2>Мои плейлисты</h2>';
        html += '<button class="btn-outline" id="createPlaylistBtn" style="margin-bottom:20px;"><i class="fas fa-plus"></i> Создать плейлист</button>';
        
        if (playlists.length === 0) {
          html += '<p style="color:var(--text-secondary);">Плейлистов пока нет.</p>';
        } else {
          playlists.forEach(p => {
            html += `
              <div style="background:var(--card-bg); padding:16px; border-radius:12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
                <div class="playlist-link" data-playlist-id="${p.id}" style="cursor:pointer;">
                  <strong>${escapeHtml(p.name)}</strong>
                  <div style="color:var(--text-secondary); font-size:14px;">${(p.videoIds || []).length} видео</div>
                </div>
                <button class="btn-danger delete-playlist-btn" data-playlist-id="${p.id}"><i class="fas fa-trash"></i></button>
              </div>`;
          });
        }
        pageContainer.innerHTML = html;
        
        document.getElementById('createPlaylistBtn')?.addEventListener('click', async () => {
          const name = prompt('Название плейлиста:');
          if (name && name.trim()) {
            await db.collection('playlists').add({
              name: name.trim(),
              ownerId: currentUser.uid,
              owner: currentUser.username,
              videoIds: [],
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            renderPlaylistsPage();
          }
        });
        
        document.querySelectorAll('.playlist-link').forEach(el => {
          el.addEventListener('click', () => navigateTo('playlist', el.dataset.playlistId));
        });
        
        document.querySelectorAll('.delete-playlist-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (confirm('Удалить плейлист?')) {
              await db.collection('playlists').doc(btn.dataset.playlistId).delete();
              renderPlaylistsPage();
            }
          });
        });
      } catch (error) {
        pageContainer.innerHTML = `<p style="color:#ef4444;">Ошибка: ${error.message}</p>`;
      }
    }

    // Плейлист
    async function renderPlaylistPage(playlistId) {
      pageContainer.innerHTML = '<div class="loader"></div>';
      try {
        const docSnap = await db.collection('playlists').doc(playlistId).get();
        if (!docSnap.exists) {
          pageContainer.innerHTML = '<p>Плейлист не найден.</p>';
          return;
        }
        const playlist = { id: docSnap.id, ...docSnap.data() };
        const videoIds = playlist.videoIds || [];
        
        let videos = [];
        if (videoIds.length > 0) {
          const snapshot = await db.collection('videos').where(firebase.firestore.FieldPath.documentId(), 'in', videoIds).get();
          videos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        }
        
        let html = `<h2>${escapeHtml(playlist.name)}</h2>`;
        html += `<button class="btn-outline" onclick="navigateTo('playlists')" style="margin-bottom:16px;"><i class="fas fa-arrow-left"></i> Назад</button>`;
        
        if (videos.length === 0) {
          html += '<p style="color:var(--text-secondary);">В плейлисте нет видео.</p>';
        } else {
          html += '<div class="video-grid">';
          videos.forEach(v => {
            const thumb = v.thumbnail || '';
            html += `
              <div class="video-card" data-video-id="${v.id}">
                <div class="thumbnail" style="background-image:url('${thumb}'); background-size:cover;">
                  <div class="play-icon-overlay"><i class="fas fa-play"></i></div>
                </div>
                <div class="video-info">

    // Загрузка видео
    function renderUploadPage() {
      if (!currentUser) {
        pageContainer.innerHTML = `
          <div class="form-container">
            <h2>Требуется авторизация</h2>
            <p style="color:var(--text-secondary);">Войдите, чтобы загружать видео.</p>
            <button class="btn" style="margin-top:15px;" onclick="navigateTo('login')">Войти</button>
          </div>`;
        return;
      }
      
      pageContainer.innerHTML = `
        <div class="form-container">
          <h2 style="margin-bottom:20px;"><i class="fas fa-cloud-upload-alt" style="color:var(--teal-primary);"></i> Загрузить видео</h2>
          <form id="uploadForm">
            <div class="form-group">
              <label>Название видео</label>
              <input type="text" id="videoTitle" required placeholder="Введите название">
            </div>
            <div class="form-group">
              <label>Описание</label>
              <textarea id="videoDesc" rows="4" placeholder="Расскажите о видео"></textarea>
            </div>
            <div class="form-group">
              <label>Файл видео (MP4, WebM)</label>
              <input type="file" id="videoFile" accept="video/*" required>
              <small style="color:var(--text-secondary);">Макс. размер: 50 МБ</small>
            </div>
            <div class="form-group">
              <label>URL миниатюры (необязательно)</label>
              <input type="url" id="videoThumb" placeholder="https://...">
            </div>
            <button type="submit" class="btn">Загрузить</button>
            <p id="uploadError" class="error-message"></p>
            <div id="uploadProgress" style="margin-top:10px;"></div>
          </form>
        </div>`;

      document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('videoTitle').value.trim();
        const desc = document.getElementById('videoDesc').value.trim();
        const thumb = document.getElementById('videoThumb').value.trim();
        const file = document.getElementById('videoFile').files[0];
        const progressDiv = document.getElementById('uploadProgress');
        const errorDiv = document.getElementById('uploadError');
        
        if (!title || !file) {
          errorDiv.textContent = 'Заполните обязательные поля';
          return;
        }
        if (containsBadWords(title) || containsBadWords(desc)) {
          errorDiv.textContent = 'Название или описание содержат недопустимые слова';
          return;
        }

        progressDiv.innerHTML = '<div class="loader"></div> Загрузка...';
        
        try {
          const storageRef = storage.ref(`videos/${currentUser.uid}/${Date.now()}_${file.name}`);
          const uploadTask = storageRef.put(file);
          
          uploadTask.on('state_changed', 
            (snapshot) => {
              const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
              progressDiv.innerHTML = `Загрузка: ${Math.round(progress)}%`;
            },
            (error) => {
              errorDiv.textContent = error.message;
            },
            async () => {
              const videoUrl = await uploadTask.snapshot.ref.getDownloadURL();
              await db.collection('videos').add({
                title,
                description: desc,
                videoUrl,
                thumbnail: thumb,
                author: currentUser.username,
                authorId: currentUser.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                views: 0,
                likes: [],
                dislikes: [],
                comments: []
              });
              progressDiv.innerHTML = '<span class="success-message">✅ Видео загружено!</span>';
              setTimeout(() => navigateTo('home'), 1000);
            }
          );
        } catch (error) {
          errorDiv.textContent = error.message;
        }
      });
    }

    // Страница видео
    async function renderVideoPage(videoId) {
      pageContainer.innerHTML = '<div class="loader"></div>';
      try {
        const docSnap = await db.collection('videos').doc(videoId).get();
        if (!docSnap.exists) {
          pageContainer.innerHTML = '<p>Видео не найдено.</p>';
          return;
        }
        const video = { id: docSnap.id, ...docSnap.data() };
        
        // Увеличиваем просмотры
        await db.collection('videos').doc(videoId).update({
          views: firebase.firestore.FieldValue.increment(1)
        });
        video.views = (video.views || 0) + 1;
        
        const isAuthor = currentUser && video.authorId === currentUser.uid;
        const userLike = currentUser ? (video.likes || []).includes(currentUser.uid) : false;
        const userDislike = currentUser ? (video.dislikes || []).includes(currentUser.uid) : false;
        
        // Проверяем подписку
        let isSubscribed = false;
        if (currentUser && !isAuthor) {
          const subDoc = await db.collection('subscriptions').doc(currentUser.uid).get();
          if (subDoc.exists) {
            isSubscribed = (subDoc.data().authors || []).includes(video.author);
          }
        }
        
        let html = `
          <div style="max-width:900px; margin:0 auto;">
            <video class="video-player" controls src="${video.videoUrl}"></video>
            <div class="video-details">
              <h2 style="margin-bottom:8px;">${escapeHtml(video.title)}</h2>
              <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
                <span style="color:var(--text-secondary);">${video.views} просмотров • ${video.createdAt ? new Date(video.createdAt.toDate()).toLocaleDateString() : ''}</span>
                <div class="actions-row">
                  <button class="vote-btn ${userLike ? 'active' : ''}" id="likeBtn"><i class="far fa-thumbs-up"></i> <span id="likesCount">${(video.likes || []).length}</span></button>
                  <button class="vote-btn ${userDislike ? 'active' : ''}" id="dislikeBtn"><i class="far fa-thumbs-down"></i> <span id="dislikesCount">${(video.dislikes || []).length}</span></button>
                </div>
              </div>
              <div style="margin-top:16px; padding-top:16px; border-top:1px solid var(--border-color);">
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
                  <div class="channel-img" style="background:var(--teal-primary);">${video.author.charAt(0).toUpperCase()}</div>
                  <span class="author-link">${escapeHtml(video.author)}</span>
                  ${!isAuthor && currentUser ? `<button class="subscribe-btn ${isSubscribed ? 'subscribed' : ''}" id="subscribeBtn">${isSubscribed ? 'Вы подписаны' : 'Подписаться'}</button>` : ''}
                </div>
                <p style="color:var(--text-secondary); white-space:pre-wrap;">${escapeHtml(video.description || '')}</p>
              </div>
              ${currentUser ? `<button class="btn-outline" id="saveToPlaylistBtn" style="margin-top:12px;"><i class="fas fa-save"></i> Сохранить в плейлист</button>` : ''}
              ${isAuthor ? `
                <div style="margin-top:12px; display:flex; gap:10px;">
                  <button class="btn-outline" id="editVideoBtn"><i class="fas fa-edit"></i> Редактировать</button>
                  <button class="btn-danger" id="deleteVideoBtn"><i class="fas fa-trash"></i> Удалить</button>
                </div>` : ''}
            </div>
            
            <!-- Комментарии -->
            <div class="video-details comment-section">
              <h3>Комментарии (${(video.comments || []).length})</h3>
              ${currentUser ? `
                <div style="display:flex; gap:12px; margin-bottom:20px;">
                  <div class="comment-avatar">${currentUser.username.charAt(0).toUpperCase()}</div>
                  <div style="flex:1;">
                    <input type="text" id="newCommentText" placeholder="Оставьте комментарий..." style="width:100%; padding:8px; background:#0f1219; border:1px solid var(--border-color); border-radius:8px; color:white;">
                    <button class="btn" id="postCommentBtn" style="margin-top:8px;">Отправить</button>
                  </div>
                </div>` : '<p style="color:var(--text-secondary);">Войдите, чтобы комментировать.</p>'}
              <div id="commentsList">
                ${(video.comments || []).sort((a,b) => new Date(b.date) - new Date(a.date)).map(c => `
                  <div class="comment">
                    <div class="comment-avatar">${c.author.charAt(0).toUpperCase()}</div>
                    <div class="comment-body">
                      <span class="comment-author">${escapeHtml(c.author)}</span>
                      <span class="comment-date">${new Date(c.date).toLocaleString()}</span>
                      <div class="comment-text">${escapeHtml(c.text)}</div>
                    </div>
                    ${(currentUser && (currentUser.uid === c.authorId || isAuthor)) ? `<i class="fas fa-trash-alt delete-comment-btn" data-comment-id="${c.id}" title="Удалить"></i>` : ''}
                  </div>
                `).join('') || '<p style="color:var(--text-secondary);">Нет комментариев.</p>'}
              </div>
            </div>
            <button class="btn-outline" style="margin-top:16px;" onclick="navigateTo('home')"><i class="fas fa-arrow-left"></i> Назад</button>
          </div>`;
        
        pageContainer.innerHTML = html;
        
        // Обработчики
        document.querySelector('.author-link')?.addEventListener('click', () => navigateTo('profile', video.author));
        
        document.getElementById('subscribeBtn')?.addEventListener('click', async () => {
          const subRef = db.collection('subscriptions').doc(currentUser.uid);
          const subDoc = await subRef.get();
          let authors = subDoc.exists ? (subDoc.data().authors || []) : [];
          if (isSubscribed) {
            authors = authors.filter(a => a !== video.author);
          } else {
            authors.push(video.author);
          }
          await subRef.set({ authors }, { merge: true });
          renderVideoPage(videoId);
        });
        
        document.getElementById('likeBtn')?.addEventListener('click', () => handleVote(videoId, 'like'));
        document.getElementById('dislikeBtn')?.addEventListener('click', () => handleVote(videoId, 'dislike'));
        
        document.getElementById('editVideoBtn')?.addEventListener('click', () => showEditForm(video));
        document.getElementById('deleteVideoBtn')?.addEventListener('click', async () => {
          if (confirm('Удалить видео?')) {
            await db.collection('videos').doc(videoId).delete();
            navigateTo('home');
          }
        });
        
        document.getElementById('postCommentBtn')?.addEventListener('click', async () => {
          const text = document.getElementById('newCommentText').value.trim();
          if (!text) return;
          if (containsBadWords(text)) {
            alert('Комментарий содержит недопустимые слова.');
            return;
          }
          const newComment = {
            id: Date.now().toString(),
            authorId: currentUser.uid,
            author: currentUser.username,
            text,
            date: new Date().toISOString()
          };
          await db.collection('videos').doc(videoId).update({
            comments: firebase.firestore.FieldValue.arrayUnion(newComment)
          });
          renderVideoPage(videoId);
        });
        
        document.querySelectorAll('.delete-comment-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (confirm('Удалить комментарий?')) {
              const commentId = btn.dataset.commentId;
              const updatedComments = (video.comments || []).filter(c => c.id !== commentId);
              await db.collection('videos').doc(videoId).update({ comments: updatedComments });
              renderVideoPage(videoId);
            }
          });
        });
        
        document.getElementById('saveToPlaylistBtn')?.addEventListener('click', () => showPlaylistModal(videoId));
        
      } catch (error) {
        pageContainer.innerHTML = `<p style="color:#ef4444;">Ошибка: ${error.message}</p>`;
      }
    }

    async function handleVote(videoId, type) {
      if (!currentUser) {
        alert('Войдите, чтобы голосовать.');
        return;
      }
      const videoRef = db.collection('videos').doc(videoId);
      const docSnap = await videoRef.get();
      if (!docSnap.exists) return;
      
      const video = docSnap.data();
      let likes = video.likes || [];
      let dislikes = video.dislikes || [];
      
      // Убираем из обоих массивов
      likes = likes.filter(uid => uid !== currentUser.uid);
      dislikes = dislikes.filter(uid => uid !== currentUser.uid);
      
      // Добавляем в нужный
      if (type === 'like') likes.push(currentUser.uid);
      else if (type === 'dislike') dislikes.push(currentUser.uid);
      
      await videoRef.update({ likes, dislikes });
      renderVideoPage(videoId);
    }

          </div>

        if (e.target === document.getElementById('editModal')) e.target.remove();

    // Поиск
    async function renderSearchPage(query) {
      if (!query) {
        pageContainer.innerHTML = '<h2>Поиск</h2><p style="color:var(--text-secondary);">Введите запрос.</p>';
        return;
      }
      pageContainer.innerHTML = '<div class="loader"></div>';
      try {
        const q = query.toLowerCase();
        const snapshot = await db.collection('videos').orderBy('createdAt', 'desc').get();
        const videos = snapshot.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .filter(v => v.title.toLowerCase().includes(q) || (v.description || '').toLowerCase().includes(q));
        
        let html = `<h2>Результаты по запросу «${escapeHtml(query)}»</h2>`;
        if (videos.length === 0) {
          html += '<p style="color:var(--text-secondary);">Ничего не найдено.</p>';
        } else {
          html += '<div class="video-grid">';
          videos.forEach(v => {
            const thumb = v.thumbnail || '';
            html += `
              <div class="video-card" data-video-id="${v.id}">
                <div class="thumbnail" style="background-image:url('${thumb}'); background-size:cover;">
                  <div class="play-icon-overlay"><i class="fas fa-play"></i></div>
                </div>
                <div class="video-info">
                  <div class="channel-img" style="background:var(--teal-primary);">${v.author.charAt(0).toUpperCase()}</div>
                  <div>
                    <div class="video-title">${escapeHtml(v.title)}</div>
                    <div class="video-meta">${escapeHtml(v.author)} • ${v.views || 0} просмотров</div>
                  </div>
                </div>
              </div>`;
          });
          html += '</div>';
        }
        pageContainer.innerHTML = html;
        document.querySelectorAll('.video-card').forEach(card => {
          card.addEventListener('click', () => navigateTo('video', card.dataset.videoId));
        });
      } catch (error) {
        pageContainer.innerHTML = `<p style="color:#ef4444;">Ошибка: ${error.message}</p>`;
      }
    }

    // Авторизация
    function renderAuthPage() {
      pageContainer.innerHTML = `
        <div class="form-container">
          <h2 style="margin-bottom:20px;">Вход / Регистрация</h2>
          <div id="authTabs" style="display:flex; gap:8px; margin-bottom:20px;">
            <button class="btn-outline active" data-tab="login">Вход</button>
            <button class="btn-outline" data-tab="register">Регистрация</button>
          </div>
          <div id="loginForm">
            <form id="loginFormInner">
              <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" required>
              </div>
              <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" required>
              </div>
              <button type="submit" class="btn">Войти</button>
              <p id="loginError" class="error-message"></p>
            </form>
          </div>
          <div id="registerForm" style="display:none;">
            <form id="registerFormInner">
              <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" id="regUsername" required>
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" required>
              </div>
              <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="regPassword" required minlength="6">
              </div>
              <button type="submit" class="btn">Зарегистрироваться</button>
              <p id="regError" class="error-message"></p>
            </form>
          </div>
        </div>`;

      const tabBtns = document.querySelectorAll('#authTabs .btn-outline');
      tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          tabBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const tab = btn.dataset.tab;
          document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
          document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        });
      });

      document.getElementById('loginFormInner').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        try {
          await auth.signInWithEmailAndPassword(email, password);
          navigateTo('home');
        } catch (error) {
          document.getElementById('loginError').textContent = error.message;
        }
      });

      document.getElementById('registerFormInner').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        
        if (containsBadWords(username)) {
          document.getElementById('regError').textContent = 'Имя содержит недопустимые слова';
          return;
        }
        
        try {
          const cred = await auth.createUserWithEmailAndPassword(email, password);
          await db.collection('users').doc(cred.user.uid).set({
            username,
            email,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          navigateTo('home');
        } catch (error) {
          document.getElementById('regError').textContent = error.message;
        }
      });
    }

    // ========== ПОИСК ==========
    document.getElementById('searchBtn').addEventListener('click', () => {
      const query = document.getElementById('searchInput').value.trim();
      if (query) navigateTo('search', query);
    });
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const query = e.target.value.trim();
        if (query) navigateTo('search', query);
      }
    });

    // ========== НАВИГАЦИЯ ==========
    window.navigateTo = navigateTo;
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        const page = item.dataset.page;
        if ((page === 'upload' || page === 'subscriptions' || page === 'playlists') && !currentUser) {
          navigateTo('login');
        } else {
          navigateTo(page);
        }
      });
    });

    // Старт
    renderApp();
  </script>
</body>
</html>
